name: Run Automation Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # - name: Cache webdriver-manager
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.wdm
      #     key: ${{ runner.os }}-wdm-${{ hashFiles('requirements.txt') }}
      #     restore-keys: |
      #       ${{ runner.os }}-wdm-

      # 不再需要 apt 安装 chromium，因为 webdriver-manager 会下载匹配的驱动
      # 但需要确保系统有 Chrome 浏览器本身
      - name: Install Chrome browser
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version   # 打印 Chrome 版本

      - name: Test Chrome headless launch
        run: |
          google-chrome --headless --no-sandbox --disable-dev-shm-usage --dump-dom https://example.com || echo "Chrome launch failed, but continuing..."
          
      - name: Override browser to chrome in config.yaml
        run: |
          sed -i 's/^browser:.*/browser: "chrome"/' config/config.yaml

      - name: Run tests (headless mode)
        run: |
          pytest tests/test_login.py -v --alluredir=./allure-results

      - name: Upload Allure results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages