name: Run Automation Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 使用 browser-actions/setup-chrome 安装 Chrome 和 chromedriver（最稳定）
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # 验证安装并设置环境变量
      - name: Verify Chrome and chromedriver
        run: |
          google-chrome --version
          chromedriver --version
          echo "CHROME_BIN=$(which google-chrome)" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=$(which chromedriver)" >> $GITHUB_ENV

      - name: Override browser to chrome in config.yaml
        run: |
          sed -i 's/^browser:.*/browser: "chrome"/' config/config.yaml
          sed -i 's/^headless:.*/headless: true/' config/config.yaml

      - name: Quick test Chrome launch with Python
        run: |
          python << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          import os
          options = webdriver.ChromeOptions()
          options.add_argument('--headless')
          options.add_argument('--no-sandbox')
          options.add_argument('--disable-dev-shm-usage')
          service = Service(os.environ['CHROMEDRIVER_PATH'])
          driver = webdriver.Chrome(service=service, options=options)
          driver.get('https://example.com')
          print('Title:', driver.title)
          driver.quit()
          EOF
        
      - name: Simple selenium test with framework
        run: |
          python << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.chrome.service import Service
          import os
          options = webdriver.ChromeOptions()
          options.add_argument('--headless')
          options.add_argument('--no-sandbox')
          options.add_argument('--disable-dev-shm-usage')
          service = Service(os.environ['CHROMEDRIVER_PATH'])
          driver = webdriver.Chrome(service=service, options=options)
          driver.get('https://example.com')
          print('Simple test passed')
          driver.quit()
          EOF

      - name: List files before test
        run: ls -la

      - name: Run tests (headless mode)
        run: |
          pytest tests/test_login.py -v --alluredir=./allure-results

      - name: List files after test
        if: always()
        run: ls -la
        
      - name: Upload Allure results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages